server:
  port: 8081
  servlet:
    session:
      timeout: 2d # default 30m
spring:
  session:
    store-type: redis

  datasource:
    url: jdbc:${DB_SQL_NAME}://${DB_URL}
#    url: jdbc:mariadb://db:3306/mydb
    username: ${DB_LOGIN}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      minimum-idle: 1
  jpa:
    show_sql: true
    hibernate:
      ddl-auto: update


  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
