server:
  port: 8081
  servlet:
    session:
      timeout: 7d # default 30m
spring:
  session:
    store-type: redis

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: jdbc:${DB_SQL_NAME}://${DB_URL:db:3306/mydb}
    # todo поменять на постгрес
    username: ${DB_LOGIN}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      minimum-idle: 1
  jpa:
    show_sql: false
    hibernate:
      ddl-auto: update

  minio:
    endpoint: http://${MINIO_SERVICE_NAME:minio}:9010
    access-key: admin
    secret-key: ${MINIO_PASSWORD:admin123}
    bucket: user-bucket


  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379