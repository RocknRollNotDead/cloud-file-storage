
services:
  db:
    container_name: mydb
    image: mariadb:lts
    env_file:
      - .env
    environment:
      MARIADB_DATABASE: mydb
      MARIADB_USER: ${DB_LOGIN}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

    ports:
      - "3306:3306"

    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    container_name: myapp
    build: .
    env_file:
      - .env
    environment:
      DB_URL: db:3306/mydb
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"

  redis:
    container_name: redis
    image: redis:8
    command: redis-server --appendonly yes
#    ports:
#      - ${REDIS_PORT}
#    environment:


    volumes:
      - redis-data:/data




    # minio
    # redis



volumes:
  db_data:
  redis-data:
