server:
  port: 8081
  servlet:
    context-path: /api
spring:


  datasource:
    url: jdbc:${DB_SQL_NAME}://${DB_URL}
    username: ${DB_LOGIN}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 1
  jpa:
    show_sql: true
    hibernate:
      ddl-auto: update

  session:
    store-type: redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}